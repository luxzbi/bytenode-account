<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bytenode 계정</title>
<style>
:root{
  --bg:#0a0a0a; --bg2:#111214; --bg3:#191b1e;
  --border:#232529; --border2:#33363c;
  --text:#eceef0; --text2:#8b9097; --text3:#5c6167; --accent:#c8c8c8;
  --err:#ff6b6b; --ok:#6bcf8e; --focus:#e8e8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;-webkit-font-smoothing:antialiased;}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(1200px 500px at 50% -10%, rgba(200,200,200,.045), transparent 60%),
    var(--bg);
}
.card{
  width:100%;max-width:392px;background:var(--bg2);
  border:1px solid var(--border);border-radius:16px;padding:40px 36px 32px;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 24px 60px -30px rgba(0,0,0,.8);
}
.mark{
  width:44px;height:44px;margin:0 auto 18px;border-radius:12px;
  background:linear-gradient(145deg,#232529,#141518);
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:19px;letter-spacing:-1px;color:var(--text);
}
.logo{font-size:19px;font-weight:700;letter-spacing:-.4px;text-align:center;}
.logo span{color:var(--text2);font-weight:500;}
.sub{font-size:13px;color:var(--text2);text-align:center;margin-top:7px;line-height:1.6;min-height:0;}
.sub:empty{display:none;}
.sub b{color:var(--accent);font-weight:600;}
.tabs{display:flex;gap:4px;margin:26px 0 4px;background:var(--bg3);border-radius:10px;padding:4px;border:1px solid var(--border);}
.tabs button{
  flex:1;padding:9px 0;border:none;border-radius:7px;background:none;
  color:var(--text2);font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:color .15s,background .15s;
}
.tabs button.on{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.5);}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 6px;letter-spacing:.02em;}
input[type=text],input[type=password]{
  width:100%;padding:11px 13px;border-radius:9px;font-size:14px;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);outline:none;font-family:inherit;
  transition:border-color .15s, box-shadow .15s;
}
input[type=text]:focus,input[type=password]:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(232,232,232,.08);}
input::placeholder{color:var(--text3);}
.rem{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none;}
.rem input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;}
.btn{
  width:100%;margin-top:22px;padding:12px 0;border:none;border-radius:9px;
  background:var(--text);color:#0a0a0a;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:background .15s, transform .05s;
}
.btn:hover{background:#ffffff;}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.45;cursor:default;transform:none;}
.msg{font-size:13px;margin-top:14px;text-align:center;min-height:18px;}
.msg.err{color:var(--err);}
.msg.ok{color:var(--ok);}
.foot{font-size:11.5px;color:var(--text3);text-align:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);line-height:1.9;}
.foot a{color:var(--text2);text-decoration:none;}
.foot a:hover{color:var(--text);text-decoration:underline;}
.below{font-size:11.5px;color:var(--text3);margin-top:22px;display:flex;gap:14px;align-items:center;}
.below a{color:var(--text3);text-decoration:none;}
.below a:hover{color:var(--text2);}
.below .dot{width:2px;height:2px;border-radius:50%;background:var(--text3);}
#nameRow{display:none;}
.already{display:none;text-align:center;padding-top:8px;}
.already .who{font-size:14.5px;color:var(--text2);margin-top:20px;}
.already .who b{color:var(--text);font-weight:600;}
.already .btn{margin-top:20px;}
.ghost{
  width:100%;margin-top:10px;padding:11px 0;border:1px solid var(--border2);border-radius:9px;
  background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;
  transition:color .15s,border-color .15s;
}
.ghost:hover{color:var(--text);border-color:var(--accent);}
</style>
</head>
<body>
<div class="card">
  <div class="mark">b</div>
  <div class="logo">bytenode <span>계정</span></div>
  <div class="sub" id="sub"></div>

  <!-- 이미 로그인된 경우 -->
  <div class="already" id="alreadyBox">
    <div class="who"><b id="alreadyName"></b>님으로 로그인되어 있습니다</div>
    <button class="btn" id="continueBtn">이 계정으로 계속하기</button>
    <button class="ghost" id="switchBtn">다른 계정 사용</button>
  </div>

  <div id="authBox">
    <div class="tabs">
      <button id="tabLogin" class="on" type="button">로그인</button>
      <button id="tabSignup" type="button">회원가입</button>
    </div>

    <form id="form" autocomplete="on">
      <label>아이디</label>
      <input type="text" id="username" autocomplete="username" required>
      <div id="nameRow">
        <label>표시 이름</label>
        <input type="text" id="displayName" maxlength="20">
      </div>
      <label>비밀번호</label>
      <input type="password" id="password" autocomplete="current-password" required minlength="6" maxlength="128">
      <label class="rem"><input type="checkbox" id="remember" checked> 로그인 상태 유지</label>
      <button class="btn" id="submitBtn" type="submit">로그인</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <div class="foot">
    가입 시 <a href="/terms" target="_blank">이용약관</a> 및 <a href="/privacy" target="_blank">개인정보처리방침</a>에 동의하게 됩니다.
  </div>
</div>

<div class="below">
  <a href="/developer">개발자</a><span class="dot"></span>
  <a href="/terms">약관</a><span class="dot"></span>
  <a href="/privacy">개인정보</a><span class="dot"></span>
  <span>© bytenode</span>
</div>

<script>
const $ = id => document.getElementById(id);
const qs = new URLSearchParams(location.search);

/* 파라미터: OAuth(client_id, redirect_uri, state) 또는 단순 SSO(redirect) */
const oauth = {
  clientId: qs.get('client_id'),
  redirectUri: qs.get('redirect_uri'),
  state: qs.get('state')
};
const simpleRedirect = qs.get('redirect');
const serviceNames = { bytenode:'bytenode', byteexam:'byteexam', bytetext:'bytetext', bytewrite:'bytewrite' };
if (oauth.clientId && serviceNames[oauth.clientId]) {
  $('sub').innerHTML = '<b>' + serviceNames[oauth.clientId] + '</b>에서 사용할 계정으로 계속하세요';
}

let mode = 'login';
function setMode(m) {
  mode = m;
  $('tabLogin').classList.toggle('on', m === 'login');
  $('tabSignup').classList.toggle('on', m === 'signup');
  $('nameRow').style.display = m === 'signup' ? 'block' : 'none';
  $('submitBtn').textContent = m === 'signup' ? '가입하기' : '로그인';
  $('msg').textContent = '';
}
$('tabLogin').onclick = () => setMode('login');
$('tabSignup').onclick = () => setMode('signup');
/* /welcome → 회원가입, /login → 로그인 */
if (location.pathname === '/welcome' || qs.get('mode') === 'signup') setMode('signup');

const getToken = () => localStorage.getItem('bn_token') || sessionStorage.getItem('bn_token') || '';
function saveSession(token, user, remember) {
  const st = remember ? localStorage : sessionStorage;
  const other = remember ? sessionStorage : localStorage;
  st.setItem('bn_token', token); st.setItem('bn_me', JSON.stringify(user || {}));
  other.removeItem('bn_token'); other.removeItem('bn_me');
}
function clearSession() {
  ['bn_token','bn_me'].forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); });
}

/* 인증 완료 후 목적지로 이동 */
async function finish(token) {
  if (oauth.clientId && oauth.redirectUri) {
    const r = await fetch('/api/authorize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, client_id: oauth.clientId, redirect_uri: oauth.redirectUri, state: oauth.state })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '인가에 실패했습니다.');
    location.href = data.location;
    return;
  }
  if (simpleRedirect) {
    try {
      const u = new URL(simpleRedirect, location.origin);
      if (u.protocol === 'https:' || u.protocol === 'http:') {
        u.hash = 'bn_token=' + encodeURIComponent(token);
        location.href = u.href;
        return;
      }
    } catch (_) {}
  }
  location.href = 'https://bytenode109.vercel.app/';
}

/* 이미 로그인돼 있으면 확인 후 바로 계속 */
(async () => {
  const t = getToken();
  if (!t) return;
  try {
    const r = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + t } });
    if (!r.ok) { clearSession(); return; }
    const me = await r.json();
    $('alreadyName').textContent = me.displayName || me.username;
    $('alreadyBox').style.display = 'block';
    $('authBox').style.display = 'none';
    $('continueBtn').onclick = async () => {
      $('continueBtn').disabled = true;
      try { await finish(t); } catch (e) { alert(e.message); $('continueBtn').disabled = false; }
    };
    $('switchBtn').onclick = () => {
      clearSession();
      $('alreadyBox').style.display = 'none';
      $('authBox').style.display = 'block';
    };
  } catch (_) {}
})();

$('form').onsubmit = async e => {
  e.preventDefault();
  const btn = $('submitBtn'), msg = $('msg');
  const username = $('username').value.trim();
  const password = $('password').value;
  const displayName = $('displayName').value.trim();
  const remember = $('remember').checked;
  if (mode === 'signup' && !displayName) { msg.className = 'msg err'; msg.textContent = '표시 이름을 입력하세요.'; return; }

  btn.disabled = true; msg.className = 'msg'; msg.textContent = '처리 중…';
  try {
    const url = mode === 'signup' ? '/api/register' : '/api/login';
    const body = mode === 'signup' ? { username, displayName, password } : { username, password };
    const r = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '요청에 실패했습니다.');
    saveSession(data.token, data.user, remember);
    msg.className = 'msg ok';
    msg.textContent = (mode === 'signup' ? '가입 완료. ' : '로그인 성공. ') + '이동 중…';
    await finish(data.token);
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = err.message;
    btn.disabled = false;
  }
};
</script>
</body>
</html>
